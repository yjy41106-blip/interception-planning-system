<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多单位协同拦截动态目标系统 v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'JetBrains Mono', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            padding-bottom: 70px;
        }

        /* 顶部导航栏 */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 2px solid #1a4d6d;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #00d4ff;
            letter-spacing: 2px;
        }

        .header-version {
            margin-left: auto;
            font-size: 10px;
            color: #a0a0a0;
        }

        /* 左侧控制面板 */
        .left-panel {
            width: 240px;
            background: rgba(26, 45, 77, 0.5);
            border-right: 2px solid #1a4d6d;
            padding: 80px 16px 16px;
            overflow-y: auto;
            box-shadow: inset -2px 0 8px rgba(0, 0, 0, 0.3);
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .panel-section h3 {
            font-size: 12px;
            font-weight: 600;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid #1a4d6d;
            padding-bottom: 8px;
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            color: #a0a0a0;
            margin-bottom: 6px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #1a4d6d;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        }

        .control-value {
            font-size: 12px;
            color: #00d4ff;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .mode-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .mode-btn {
            flex: 1;
            padding: 6px;
            border: 1px solid #1a4d6d;
            background: rgba(26, 45, 77, 0.5);
            color: #a0a0a0;
            font-size: 10px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }

        /* 中央战场 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-top: 60px;
        }

        #canvas {
            flex: 1;
            background: linear-gradient(135deg, #0a0e27 0%, #1a2d4d 100%);
            cursor: crosshair;
            display: block;
        }

        /* 底部操作栏 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 14, 39, 0.98);
            border-top: 3px solid #00d4ff;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            box-shadow: 0 -2px 20px rgba(0, 212, 255, 0.3);
            z-index: 50;
        }

        .btn {
            padding: 8px 16px;
            border: 2px solid #1a4d6d;
            background: rgba(26, 45, 77, 0.5);
            color: #00d4ff;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 0 6px rgba(0, 212, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.primary {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.2);
            font-weight: 700;
            font-size: 13px;
            padding: 10px 20px;
            box-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
        }

        .btn.primary:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 24px rgba(0, 212, 255, 0.6);
            transform: scale(1.05);
        }

        .path-selector {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .path-btn {
            padding: 6px 12px;
            border: 2px solid;
            background: rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .path-btn.top1 {
            border-color: #00ff88;
            color: #00ff88;
        }

        .path-btn.top1.active {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
        }

        .path-btn.top2 {
            border-color: #b366ff;
            color: #b366ff;
        }

        .path-btn.top2.active {
            background: rgba(179, 102, 255, 0.2);
            box-shadow: 0 0 8px rgba(179, 102, 255, 0.4);
        }

        .path-btn.top3 {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .path-btn.top3.active {
            background: rgba(255, 170, 0, 0.2);
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.4);
        }

        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 11px;
            color: #a0a0a0;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-value {
            color: #00d4ff;
            font-weight: 600;
        }

        /* 右侧信息面板 */
        .right-panel {
            width: 288px;
            background: rgba(26, 45, 77, 0.5);
            border-left: 2px solid #1a4d6d;
            padding: 80px 16px 16px;
            overflow-y: auto;
            box-shadow: inset 2px 0 8px rgba(0, 0, 0, 0.3);
        }

        .info-card {
            background: rgba(10, 14, 39, 0.5);
            border: 1px solid #1a4d6d;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .info-card h4 {
            font-size: 11px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-value {
            font-size: 12px;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
        }

        .path-score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin-bottom: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid;
            border-radius: 2px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .path-score:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .path-score.top1 { border-left-color: #00ff88; }
        .path-score.top2 { border-left-color: #b366ff; }
        .path-score.top3 { border-left-color: #ffaa00; }

        .path-score-value {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        /* 模态对话框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #1a4d6d;
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .modal-content h3 {
            color: #00d4ff;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal-content p {
            color: #a0a0a0;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 8px;
            border: 1px solid #1a4d6d;
            background: rgba(26, 45, 77, 0.5);
            color: #00d4ff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
        }

        .modal-buttons button:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(26, 45, 77, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.6);
        }

        @media (max-width: 1024px) {
            .left-panel, .right-panel {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .left-panel, .right-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="header">
        <h1>⚔️ 多单位协同拦截系统 v2</h1>
        <div class="header-version">Enhanced Edition</div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 左侧控制面板 -->
        <div class="left-panel">
            <div class="panel-section">
                <h3>交互模式</h3>
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="view">查看</button>
                    <button class="mode-btn" data-mode="agent">设置我方</button>
                    <button class="mode-btn" data-mode="enemy">设置敌方</button>
                    <button class="mode-btn" data-mode="obstacle">添加障碍</button>
                </div>
            </div>

            <div class="panel-section">
                <h3>我方单位</h3>
                <div class="control-group">
                    <label>单位数量</label>
                    <input type="range" id="agentCount" min="1" max="5" value="2">
                    <div class="control-value"><span id="agentCountValue">2</span> 个</div>
                </div>
                <div class="control-group">
                    <label>单位速度</label>
                    <input type="range" id="agentSpeed" min="5" max="30" value="15">
                    <div class="control-value"><span id="agentSpeedValue">15</span> 单位/秒</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>敌方目标</h3>
                <div class="control-group">
                    <label>目标速度</label>
                    <input type="range" id="enemySpeed" min="1" max="20" value="5">
                    <div class="control-value"><span id="enemySpeedValue">5</span> 单位/秒</div>
                </div>
                <div class="control-group">
                    <label>预测时长</label>
                    <input type="range" id="predictTime" min="5" max="30" value="10">
                    <div class="control-value"><span id="predictTimeValue">10</span> 秒</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>环境设置</h3>
                <div class="info-value">
                    <div>地图: 100x100</div>
                    <div>障碍物: <span id="obstacleCount">0</span></div>
                    <div>网格: 50px</div>
                </div>
                <button class="btn" id="clearObstaclesBtn" style="width: 100%; margin-top: 8px;">清除障碍</button>
                <button class="btn" id="randomObstaclesBtn" style="width: 100%; margin-top: 8px;">随机生成</button>
            </div>
        </div>

        <!-- 中央战场 -->
        <div class="main-content">
            <canvas id="canvas"></canvas>
        </div>

        <!-- 右侧信息面板 -->
        <div class="right-panel">
            <div class="panel-section">
                <h3>Top3 路径</h3>
                <div id="pathScores">
                    <div class="info-card">
                        <h4>等待计算...</h4>
                        <div class="info-value">点击"开始规划"启动仿真</div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>拦截信息</h3>
                <div class="info-card">
                    <h4>状态</h4>
                    <div class="info-value" id="interceptStatus">未开始</div>
                </div>
                <div class="info-card">
                    <h4>拦截点</h4>
                    <div class="info-value" id="interceptPoint">-</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>系统日志</h3>
                <div id="systemLogs" style="height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border: 1px solid #1a4d6d; border-radius: 4px; padding: 8px; font-size: 10px; font-family: 'JetBrains Mono', monospace;">
                    <div style="color: #a0a0a0;">系统已就绪</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="footer">
        <button class="btn primary" id="startBtn">▶ 开始规划</button>
        <button class="btn" id="resetBtn">⟲ 重置</button>
        <button class="btn" id="exportBtn">⬇ 导出</button>
        
        <div class="path-selector" id="pathSelector" style="display: none;">
            <button class="path-btn top1 active" data-path="0">路径A</button>
            <button class="path-btn top2" data-path="1">路径B</button>
            <button class="path-btn top3" data-path="2">路径C</button>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <span>FPS:</span>
                <span class="status-value" id="fps">60</span>
            </div>
            <div class="status-item">
                <span>耗时:</span>
                <span class="status-value" id="duration">0ms</span>
            </div>
            <div class="status-item">
                <span>缓存:</span>
                <span class="status-value" id="cacheHit">0%</span>
            </div>
        </div>
    </div>

    <!-- 模态对话框 -->
    <div class="modal" id="helpModal">
        <div class="modal-content">
            <h3>交互说明</h3>
            <p><strong>查看模式：</strong>查看敌我轨迹和路径</p>
            <p><strong>设置我方：</strong>点击地图设置我方单位位置</p>
            <p><strong>设置敌方：</strong>点击地图设置敌方初始位置</p>
            <p><strong>添加障碍：</strong>点击地图添加多边形障碍物</p>
            <div class="modal-buttons">
                <button onclick="document.getElementById('helpModal').classList.remove('show')">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // 全局配置和状态
        // ================================================================

        const CONFIG = {
            MAP_WIDTH: 100,
            MAP_HEIGHT: 100,
            GRID_SIZE: 50,
            AGENT_COLOR: '#00d4ff',
            ENEMY_COLOR: '#ff1744',
            PATH_COLORS: ['#00ff88', '#b366ff', '#ffaa00'],
            INTERCEPT_COLOR: '#ffd700',
            OBSTACLE_COLOR: '#808080',
        };

        let state = {
            isRunning: false,
            agentCount: 2,
            agentSpeed: 15,
            enemySpeed: 5,
            predictTime: 10,
            topPaths: [],
            enemyTrajectories: [],
            animationTime: 0,
            fps: 60,
            totalDuration: 0,
            useBackend: true,
            mockData: null,
            interactionMode: 'view',
            selectedPath: 0,
            obstacles: [],
            agentPositions: [
                [10, 50],
                [90, 50],
                [50, 10],
                [50, 90],
                [30, 30],
            ],
            enemyPosition: [50, 10],
            currentPolygon: [],
        };

        // ================================================================
        // Canvas 绘制
        // ================================================================

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function worldToScreen(x, y) {
            const scaleX = canvas.width / CONFIG.MAP_WIDTH;
            const scaleY = canvas.height / CONFIG.MAP_HEIGHT;
            return [x * scaleX, y * scaleY];
        }

        function screenToWorld(sx, sy) {
            const scaleX = canvas.width / CONFIG.MAP_WIDTH;
            const scaleY = canvas.height / CONFIG.MAP_HEIGHT;
            return [sx / scaleX, sy / scaleY];
        }

        function drawGrid() {
            const scaleX = canvas.width / CONFIG.MAP_WIDTH;
            const scaleY = canvas.height / CONFIG.MAP_HEIGHT;
            
            ctx.strokeStyle = 'rgba(26, 77, 109, 0.3)';
            ctx.lineWidth = 0.5;

            for (let x = 0; x <= CONFIG.MAP_WIDTH; x += CONFIG.GRID_SIZE) {
                const screenX = x * scaleX;
                ctx.beginPath();
                ctx.moveTo(screenX, 0);
                ctx.lineTo(screenX, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y <= CONFIG.MAP_HEIGHT; y += CONFIG.GRID_SIZE) {
                const screenY = y * scaleY;
                ctx.beginPath();
                ctx.moveTo(0, screenY);
                ctx.lineTo(canvas.width, screenY);
                ctx.stroke();
            }
        }

        function drawScanWave() {
            const time = state.animationTime % 3;
            const radius = (time / 3) * Math.min(canvas.width, canvas.height) * 0.5;
            const opacity = Math.max(0, 1 - time / 3) * 0.5;

            ctx.strokeStyle = `rgba(0, 212, 255, ${opacity})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawObstacles() {
            for (const obstacle of state.obstacles) {
                ctx.fillStyle = `rgba(128, 128, 128, 0.5)`;
                ctx.strokeStyle = CONFIG.OBSTACLE_COLOR;
                ctx.lineWidth = 2;
                ctx.beginPath();

                for (let i = 0; i < obstacle.length; i++) {
                    const [x, y] = obstacle[i];
                    const [sx, sy] = worldToScreen(x, y);
                    if (i === 0) ctx.moveTo(sx, sy);
                    else ctx.lineTo(sx, sy);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            // 绘制当前多边形（编辑中）
            if (state.currentPolygon.length > 0) {
                ctx.strokeStyle = `rgba(0, 212, 255, 0.7)`;
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();

                for (let i = 0; i < state.currentPolygon.length; i++) {
                    const [x, y] = state.currentPolygon[i];
                    const [sx, sy] = worldToScreen(x, y);
                    if (i === 0) ctx.moveTo(sx, sy);
                    else ctx.lineTo(sx, sy);
                }
                ctx.stroke();
                ctx.setLineDash([]);

                // 绘制顶点
                for (const [x, y] of state.currentPolygon) {
                    const [sx, sy] = worldToScreen(x, y);
                    ctx.fillStyle = '#00d4ff';
                    ctx.beginPath();
                    ctx.arc(sx, sy, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawEnemyTrajectory() {
            if (!state.enemyTrajectories || state.enemyTrajectories.length === 0) return;

            const trajectory = state.enemyTrajectories[0];
            if (!trajectory || !trajectory.states) return;

            ctx.strokeStyle = `rgba(255, 23, 68, 0.5)`;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();

            for (let i = 0; i < trajectory.states.length; i++) {
                const [x, y] = trajectory.states[i];
                const [sx, sy] = worldToScreen(x, y);
                if (i === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            if (trajectory.states.length > 0) {
                const currentIdx = Math.floor(state.animationTime * 10) % trajectory.states.length;
                const [x, y] = trajectory.states[currentIdx];
                const [sx, sy] = worldToScreen(x, y);

                const pulse = Math.sin(state.animationTime * Math.PI * 2) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255, 23, 68, ${pulse})`;
                ctx.beginPath();
                ctx.arc(sx, sy, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = `rgba(255, 23, 68, ${pulse * 0.5})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(sx, sy, 12, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawAgents() {
            for (let i = 0; i < state.agentCount; i++) {
                const [x, y] = state.agentPositions[i];
                const [sx, sy] = worldToScreen(x, y);

                ctx.fillStyle = CONFIG.AGENT_COLOR;
                ctx.beginPath();
                ctx.arc(sx, sy, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = `rgba(0, 212, 255, 0.5)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(sx, sy, 10, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillStyle = CONFIG.AGENT_COLOR;
                ctx.font = '10px JetBrains Mono';
                ctx.fillText(`A${i + 1}`, sx + 8, sy - 8);
            }
        }

        function drawEnemyPosition() {
            const [x, y] = state.enemyPosition;
            const [sx, sy] = worldToScreen(x, y);

            ctx.fillStyle = CONFIG.ENEMY_COLOR;
            ctx.beginPath();
            ctx.arc(sx, sy, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = `rgba(255, 23, 68, 0.5)`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(sx, sy, 12, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = CONFIG.ENEMY_COLOR;
            ctx.font = '10px JetBrains Mono';
            ctx.fillText('E', sx + 8, sy - 8);
        }

        function drawPaths() {
            if (!state.topPaths || state.topPaths.length === 0) return;

            const selectedPath = state.topPaths[state.selectedPath];
            if (!selectedPath || !selectedPath.path) return;

            const color = CONFIG.PATH_COLORS[state.selectedPath];
            const drawProgress = Math.min(1, (state.animationTime * 0.5) % 1);

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.7 + Math.sin(state.animationTime * Math.PI * 2) * 0.3;
            ctx.setLineDash([2, 2]);
            ctx.beginPath();

            const pointsToDrawCount = Math.ceil(selectedPath.path.length * drawProgress);
            for (let i = 0; i < pointsToDrawCount; i++) {
                const point = selectedPath.path[i];
                const [sx, sy] = worldToScreen(point[0], point[1]);
                if (i === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;

            if (selectedPath.interception_point) {
                const [ix, iy] = selectedPath.interception_point;
                const [sx, sy] = worldToScreen(ix, iy);

                const size = 8;
                const pulse = Math.sin(state.animationTime * Math.PI * 2) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
                drawStar(sx, sy, 5, size, size * 0.5);
                ctx.fill();
            }
        }

        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawScanWave();
            drawObstacles();
            drawEnemyTrajectory();
            drawAgents();
            drawEnemyPosition();
            drawPaths();

            state.animationTime += 0.016;

            requestAnimationFrame(draw);
        }

        // ================================================================
        // 交互处理
        // ================================================================

        canvas.addEventListener('click', (e) => {
            if (state.isRunning) return;

            const rect = canvas.getBoundingClientRect();
            const sx = e.clientX - rect.left;
            const sy = e.clientY - rect.top;
            const [x, y] = screenToWorld(sx, sy);

            if (state.interactionMode === 'agent') {
                state.agentPositions[0] = [x, y];
                addLog(`设置我方单位位置: (${x.toFixed(1)}, ${y.toFixed(1)})`);
            } else if (state.interactionMode === 'enemy') {
                state.enemyPosition = [x, y];
                addLog(`设置敌方初始位置: (${x.toFixed(1)}, ${y.toFixed(1)})`);
            } else if (state.interactionMode === 'obstacle') {
                state.currentPolygon.push([x, y]);
                if (state.currentPolygon.length >= 3) {
                    state.obstacles.push([...state.currentPolygon]);
                    state.currentPolygon = [];
                    document.getElementById('obstacleCount').textContent = state.obstacles.length;
                    addLog(`添加障碍物，总数: ${state.obstacles.length}`);
                }
            }
        });

        // ================================================================
        // API 调用
        // ================================================================

        async function callBackendAPI(endpoint, data) {
            try {
                const response = await fetch(`http://localhost:8000${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

        function generateMockData() {
            const trajectory = [];
            for (let t = 0; t <= 10; t += 0.1) {
                const x = state.enemyPosition[0] + t * state.enemySpeed * Math.cos(1.57);
                const y = state.enemyPosition[1] + t * state.enemySpeed * Math.sin(1.57);
                trajectory.push([x, y, t]);
            }

            return {
                success: true,
                top_paths: {
                    "0": [
                        {
                            path: [[state.agentPositions[0][0], state.agentPositions[0][1], 0], [state.enemyPosition[0], state.enemyPosition[1], 8]],
                            score: 950.5,
                            intercepted: true,
                            interception_point: [state.enemyPosition[0], state.enemyPosition[1], 8],
                        },
                        {
                            path: [[state.agentPositions[0][0], state.agentPositions[0][1], 0], [state.enemyPosition[0] - 5, state.enemyPosition[1] + 5, 8.5]],
                            score: 920.3,
                            intercepted: true,
                            interception_point: [state.enemyPosition[0] - 5, state.enemyPosition[1] + 5, 8.5],
                        },
                        {
                            path: [[state.agentPositions[0][0], state.agentPositions[0][1], 0], [state.enemyPosition[0] + 5, state.enemyPosition[1] - 5, 9]],
                            score: 890.1,
                            intercepted: false,
                            interception_point: null,
                        },
                    ],
                },
                enemy_trajectories: [
                    { states: trajectory, length: 50 },
                    { states: trajectory, length: 50 },
                    { states: trajectory, length: 50 },
                ],
                total_time: 0.156,
                cache_stats: { hits: 2, misses: 1, hit_rate: '66.7%' },
                pruned_paths: 12,
            };
        }

        async function startPlanning() {
            if (state.isRunning) return;

            state.isRunning = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '⏳ 计算中...';
            addLog('开始规划...');

            const startTime = performance.now();

            const request = {
                agent_count: state.agentCount,
                agent_speed: state.agentSpeed,
                enemy_speed: state.enemySpeed,
                enemy_theta: 1.57,
                predict_time: state.predictTime,
            };

            let result = await callBackendAPI('/intercept', request);

            if (!result) {
                addLog('后端不可用，使用模拟数据...');
                result = generateMockData();
                state.useBackend = false;
            } else {
                state.useBackend = true;
            }

            const duration = performance.now() - startTime;
            state.totalDuration = duration;

            state.topPaths = [];
            for (const agentId in result.top_paths) {
                const paths = result.top_paths[agentId];
                state.topPaths.push(...paths.slice(0, 3));
            }

            state.enemyTrajectories = result.enemy_trajectories;

            updatePathScores();
            updateStatus(result);
            addLog(`规划完成，耗时: ${duration.toFixed(1)}ms`);

            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '▶ 开始规划';
            document.getElementById('pathSelector').style.display = 'flex';
            state.isRunning = false;
        }

        // ================================================================
        // UI 更新
        // ================================================================

        function updatePathScores() {
            const container = document.getElementById('pathScores');
            container.innerHTML = '';

            const pathNames = ['路径A (最优)', '路径B (次优)', '路径C (可选)'];

            for (let i = 0; i < Math.min(3, state.topPaths.length); i++) {
                const path = state.topPaths[i];
                const className = ['top1', 'top2', 'top3'][i];

                const html = `
                    <div class="path-score ${className}" onclick="selectPath(${i})">
                        <span>${pathNames[i]}</span>
                        <span class="path-score-value">${path.score.toFixed(1)}</span>
                    </div>
                `;
                container.innerHTML += html;
            }
        }

        function updateStatus(result) {
            const intercepted = state.topPaths.length > 0 && state.topPaths[0].intercepted;
            document.getElementById('interceptStatus').textContent = intercepted ? '✓ 拦截成功' : '✗ 拦截失败';
            document.getElementById('interceptStatus').style.color = intercepted ? '#00ff88' : '#ff1744';

            if (state.topPaths[0] && state.topPaths[0].interception_point) {
                const pt = state.topPaths[0].interception_point;
                document.getElementById('interceptPoint').textContent = `(${pt[0].toFixed(1)}, ${pt[1].toFixed(1)}, ${pt[2].toFixed(1)}s)`;
            }

            document.getElementById('duration').textContent = `${state.totalDuration.toFixed(0)}ms`;
            document.getElementById('cacheHit').textContent = result.cache_stats.hit_rate;
        }

        function addLog(message) {
            const logsContainer = document.getElementById('systemLogs');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.textContent = `[${time}] ${message}`;
            logEntry.style.color = '#a0a0a0';
            logsContainer.insertBefore(logEntry, logsContainer.firstChild);

            while (logsContainer.children.length > 10) {
                logsContainer.removeChild(logsContainer.lastChild);
            }
        }

        function selectPath(index) {
            state.selectedPath = index;
            document.querySelectorAll('.path-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            addLog(`选择路径 ${['A', 'B', 'C'][index]}`);
        }

        // ================================================================
        // 事件监听
        // ================================================================

        document.getElementById('agentCount').addEventListener('input', (e) => {
            state.agentCount = parseInt(e.target.value);
            document.getElementById('agentCountValue').textContent = state.agentCount;
        });

        document.getElementById('agentSpeed').addEventListener('input', (e) => {
            state.agentSpeed = parseInt(e.target.value);
            document.getElementById('agentSpeedValue').textContent = state.agentSpeed;
        });

        document.getElementById('enemySpeed').addEventListener('input', (e) => {
            state.enemySpeed = parseInt(e.target.value);
            document.getElementById('enemySpeedValue').textContent = state.enemySpeed;
        });

        document.getElementById('predictTime').addEventListener('input', (e) => {
            state.predictTime = parseInt(e.target.value);
            document.getElementById('predictTimeValue').textContent = state.predictTime;
        });

        document.getElementById('startBtn').addEventListener('click', startPlanning);

        document.getElementById('resetBtn').addEventListener('click', () => {
            state.topPaths = [];
            state.enemyTrajectories = [];
            state.animationTime = 0;
            state.selectedPath = 0;
            document.getElementById('pathScores').innerHTML = '<div class="info-card"><h4>等待计算...</h4><div class="info-value">点击"开始规划"启动仿真</div></div>';
            document.getElementById('interceptStatus').textContent = '未开始';
            document.getElementById('interceptPoint').textContent = '-';
            document.getElementById('pathSelector').style.display = 'none';
            addLog('已重置');
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const data = {
                timestamp: new Date().toISOString(),
                parameters: {
                    agentCount: state.agentCount,
                    agentSpeed: state.agentSpeed,
                    enemySpeed: state.enemySpeed,
                    predictTime: state.predictTime,
                    obstacles: state.obstacles,
                    agentPositions: state.agentPositions,
                    enemyPosition: state.enemyPosition,
                },
                results: {
                    topPaths: state.topPaths,
                    enemyTrajectories: state.enemyTrajectories,
                    duration: state.totalDuration,
                },
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `interception-result-${Date.now()}.json`;
            a.click();
            addLog('结果已导出');
        });

        document.getElementById('clearObstaclesBtn').addEventListener('click', () => {
            state.obstacles = [];
            state.currentPolygon = [];
            document.getElementById('obstacleCount').textContent = '0';
            addLog('已清除所有障碍物');
        });

        document.getElementById('randomObstaclesBtn').addEventListener('click', () => {
            state.obstacles = [];
            state.currentPolygon = [];
            for (let i = 0; i < 3; i++) {
                const cx = Math.random() * 80 + 10;
                const cy = Math.random() * 80 + 10;
                const size = Math.random() * 10 + 5;
                const polygon = [
                    [cx - size, cy - size],
                    [cx + size, cy - size],
                    [cx + size, cy + size],
                    [cx - size, cy + size],
                ];
                state.obstacles.push(polygon);
            }
            document.getElementById('obstacleCount').textContent = state.obstacles.length;
            addLog(`随机生成 ${state.obstacles.length} 个障碍物`);
        });

        // 交互模式切换
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.interactionMode = e.target.dataset.mode;
                addLog(`切换到${['查看', '设置我方', '设置敌方', '添加障碍'][['view', 'agent', 'enemy', 'obstacle'].indexOf(state.interactionMode)]}模式`);
            });
        });

        // 路径选择
        document.querySelectorAll('.path-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                selectPath(parseInt(e.target.dataset.path));
            });
        });

        // ================================================================
        // 初始化
        // ================================================================

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        draw();

        addLog('系统已就绪，点击"开始规划"启动仿真');
        addLog('后端地址: http://localhost:8000');
        addLog('若后端未启动，将使用模拟数据演示');
    </script>
</body>
</html>
